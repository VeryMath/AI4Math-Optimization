schema_version: 1
name: optimization-modeling-skill
version: 0.1.0
scope: computational-math-modeling
description: Convert optimization problem statements into reviewed mathematical models using imported OptSkills archetype references, then prepare solver-ready problem specs.
entrypoint: SKILL.md
requires_tools:
  - python
  - agent-native-file-inspection
input_artifacts:
  - natural_language_optimization_problem
  - optional_latex_model
  - optional_paper_excerpt
  - optional_repository_source
  - optional_data_description
output_artifacts:
  - modeling_checkpoint.md
  - problem.yaml
  - archetype_match_report
handoff_skills:
  - optimization-solver-skill
approval_required_for:
  - model_interpretation_confirmation
  - solver_code_execution
  - dependency_install
risk_level: medium
